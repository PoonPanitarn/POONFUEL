<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POON*FUEL</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111315;
    --surface: #1B1E21;
    --surface2: #262A2E;
    --border: #343A40;
    --text: #F5F5F5;
    --text-muted: #A8B0B8;
    --accent: #7BC96F;
    --accent-light: #1E3421;
    --accent2: #D4AF37;
    --danger: #C0392B;
    --danger-light: #2a1210;
    --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.1);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.3);
    --radius: 14px;
    --radius-sm: 8px;
    --sidebar-w: 240px;
    --header-h: 60px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* =====================
     AUTH SCREEN
  ===================== */
  #authScreen {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: var(--bg);
  }
  .auth-box {
    background: var(--surface);
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
  }
  .auth-logo {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .auth-logo span { color: var(--accent2); }
  .auth-tagline {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 36px;
  }

  /* =====================
     DESKTOP LAYOUT (≥768px)
  ===================== */
  #app {
    min-height: 100vh;
    background: var(--bg);
    position: relative;
  }

  /* Mobile: stack vertically */
  .app-layout {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* MOBILE HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: var(--header-h);
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  .app-logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .app-logo span { color: var(--accent2); }
  .back-btn {
    background: none; border: none; cursor: pointer;
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); font-size: 18px;
    transition: background 0.15s; flex-shrink: 0;
  }
  .back-btn:hover { background: var(--surface2); }
  .header-title { font-weight: 600; font-size: 15px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  /* MAIN CONTENT AREA (mobile) */
  .app-main {
    flex: 1;
    overflow-y: auto;
  }

  /* SCREENS */
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: #fff;
    border: none; cursor: pointer; font-size: 24px;
    box-shadow: 0 4px 20px rgba(45,80,22,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 50;
  }
  .fab:hover { transform: scale(1.08) rotate(90deg); background: #6BAF60; }

  /* =====================
     DESKTOP = same as Mobile (no sidebar, no desktop topbar)
  ===================== */
  @media (min-width: 768px) {
    /* Cap width and center for large screens */
    .app-layout {
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Desktop modal: centered, not bottom sheet */
    .modal-overlay {
      align-items: center;
    }
    .modal {
      border-radius: 20px;
      max-width: 560px;
      max-height: 85vh;
    }
    .modal-handle { display: none; }

    /* Desktop: form 2-column grid inside modal */
    .form-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 16px;
    }
    .form-2col .form-group.span2 { grid-column: 1 / -1; }
  }

  /* =====================
     SHARED COMPONENTS
  ===================== */
  /* CAR CARDS */
  .car-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .car-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
  }
  .car-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .car-icon {
    width: 46px; height: 46px;
    background: var(--accent-light);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .car-info { flex: 1; min-width: 0; }
  .car-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .car-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .car-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; color: var(--text-muted);
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
  .icon-btn.edit:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; padding: 11px 20px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.15s; width: 100%;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6BAF60; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger-light); color: #e87a6f; border: 1px solid rgba(192,57,43,0.3); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-gold { background: var(--accent2); color: #fff; }
  .btn-sm { padding: 7px 13px; font-size: 13px; width: auto; border-radius: 8px; }

  /* FORMS */
  .form-section {
    background: var(--surface); border-radius: var(--radius);
    padding: 18px 20px; border: 1px solid var(--border);
    margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .form-section h3 {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
  }
  .form-group { margin-bottom: 13px; }
  .form-group:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 0.02em; }
  input, select, textarea {
    width: 100%; padding: 10px 13px;
    border: 1px solid var(--border); border-radius: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--surface2); color: var(--text);
    transition: border 0.15s, box-shadow 0.15s; outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(123,201,111,0.12);
  }
  select option { background: var(--surface2); }
  textarea { resize: vertical; }
  .inline-calc {
    background: var(--accent-light);
    border-radius: 9px; padding: 11px 14px;
    font-size: 13px; color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-weight: 600; margin-top: 8px;
    border: 1px solid rgba(123,201,111,0.15);
  }

  .context-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  /* RECORD LIST (mobile) */
  .rec-list { display: flex; flex-direction: column; gap: 10px; }
  .rec-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px 16px; border: 1px solid var(--border);
    box-shadow: var(--shadow);
    transition: border-color 0.15s;
  }
  .rec-card:hover { border-color: rgba(123,201,111,0.3); }
  .rec-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .rec-date { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .rec-fuel-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 20px; background: var(--accent-light); color: var(--accent);
    border: 1px solid rgba(123,201,111,0.2);
  }
  .rec-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .rec-row:last-child { margin-bottom: 0; }
  .rec-label { color: var(--text-muted); }
  .rec-val { font-weight: 500; font-family: 'DM Mono', monospace; }
  .rec-highlight { font-size: 14px; font-weight: 700; color: var(--accent); }
  .rec-actions { display: flex; gap: 6px; margin-top: 10px; }

  /* STATS CARDS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px; border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .stat-card.full { grid-column: 1 / -1; }
  .stat-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
  .stat-val.gold { color: var(--accent2); }
  .stat-val.green { color: var(--accent); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* TOP 3 */
  .top3-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .top3-item:last-child { border-bottom: none; padding-bottom: 0; }
  .top3-rank {
    width: 26px; height: 26px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; flex-shrink: 0;
  }
  .rank-1 { background: var(--accent2); color: #fff; }
  .rank-2 { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .rank-3 { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .top3-name { flex: 1; font-size: 13px; font-weight: 500; }
  .top3-val { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-muted); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    z-index: 200; display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 20px 20px 28px; width: 100%; max-width: 480px;
    max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .modal-header h2 { font-size: 18px; font-weight: 700; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; width: 30px; height: 30px; cursor: pointer; color: var(--text-muted); font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { color: var(--text); background: var(--border); }
  .modal-footer { display: flex; gap: 8px; margin-top: 4px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 56px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.7; }
  .empty-title { font-weight: 700; font-size: 17px; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 14px; line-height: 1.5; }

  /* TABS */
  .tabs { display: flex; gap: 3px; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
  .tab-btn {
    flex: 1; padding: 8px 10px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; background: none; color: var(--text-muted); transition: all 0.15s;
  }
  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.15); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 18px 0; }
  .section-title { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); color: var(--text);
    padding: 11px 20px; border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    font-size: 14px; font-weight: 500;
    z-index: 300; opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* Desktop sidebar hidden on mobile */
  .app-sidebar { display: none; }
  .desktop-topbar { display: none; }
  .desktop-fab { display: none; }
  /* dt-hidden: hides a desktop-topbar even on desktop */
  @media (min-width: 768px) {
    .dt-hidden { display: none !important; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" style="display:flex;">
  <div class="auth-box">
    <div class="auth-logo">POON<span>*</span>FUEL</div>
    <div class="auth-tagline">ระบบจัดการค่าน้ำมัน</div>
    <div class="form-group">
      <label for="emailInput">อีเมล</label>
      <input type="email" id="emailInput" placeholder="your@email.com">
    </div>
    <div class="form-group" style="margin-bottom:20px;">
      <label for="passwordInput">รหัสผ่าน</label>
      <input type="password" id="passwordInput" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" onclick="loginEmail()">เข้าสู่ระบบ</button>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="registerEmail()">สมัครสมาชิก</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="app-layout">

    <!-- SIDEBAR (desktop only) -->
    <aside class="app-sidebar">
      <div class="sidebar-logo">
        POON<span>*</span>FUEL
        <span class="sidebar-tagline">ระบบจัดการค่าน้ำมัน</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">รถของฉัน</div>
        <div id="sidebarCarList"></div>
        <button class="sidebar-add-btn" onclick="openCarForm()">
          <span style="font-size:16px;">＋</span> เพิ่มรถใหม่
        </button>
      </nav>
      <div class="sidebar-footer">
        <div id="sidebarUserInfo" style="font-size:11px;color:var(--text-muted);margin-bottom:10px;padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
        <button class="btn btn-danger btn-sm" style="width:100%;" onclick="logoutFirebase()">🚪 ออกจากระบบ</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="app-main">

      <!-- MOBILE HEADER -->
      <div class="app-header">
        <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none;">←</button>
        <div class="app-logo" id="headerLogo">POON<span>*</span>FUEL</div>
        <div class="header-title" id="headerTitle"></div>
        <div class="header-actions">
          <button class="btn btn-sm btn-danger" onclick="logoutFirebase()" style="gap:4px;">🚪 ออก</button>
        </div>
      </div>

      <!-- DESKTOP TOPBAR (outside screens, always visible on desktop) -->
      <div class="desktop-topbar" id="desktopTopbarList">
        <div class="desktop-topbar-title">รถของฉัน</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span id="mobileUserInfo" style="font-size:12px;color:var(--text-muted);"></span>
          <button class="desktop-fab" onclick="openCarForm()">＋ เพิ่มรถใหม่</button>
          <button class="desktop-logout-btn" onclick="logoutFirebase()">🚪 ออกจากระบบ</button>
        </div>
      </div>
      <div class="desktop-topbar dt-hidden" id="desktopTopbarDetail">
        <div style="display:flex;align-items:center;gap:12px;">
          <button onclick="goBack()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;">← กลับ</button>
          <div class="desktop-topbar-title" id="desktopCarTitle"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="desktop-fab" onclick="openRecordForm()">⛽ เติมน้ำมัน</button>
          <button class="desktop-logout-btn" onclick="logoutFirebase()">🚪 ออกจากระบบ</button>
        </div>
      </div>

      <!-- CAR LIST -->
      <div class="screen active" id="carListScreen">
        <div id="carListContent"></div>
        <button class="fab" onclick="openCarForm()">+</button>
      </div>

      <!-- CAR DETAIL -->
      <div class="screen" id="carDetailScreen">
        <div id="carDetailContent"></div>
        <button class="fab" onclick="openRecordForm()">+</button>
      </div>

    </div><!-- /app-main -->
  </div><!-- /app-layout -->

  <!-- CAR FORM MODAL -->
  <div class="modal-overlay" id="carFormModal" onclick="handleOverlayClick(event,'carFormModal')">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 id="carFormTitle">เพิ่มรถใหม่</h2>
        <button class="modal-close" onclick="closeCarForm()">✕</button>
      </div>
      <div class="form-section">
        <h3>ข้อมูลรถ</h3>
        <div class="form-2col">
          <div class="form-group">
            <label for="carBrand">ยี่ห้อ *</label>
            <input type="text" id="carBrand" placeholder="เช่น Toyota, Honda">
          </div>
          <div class="form-group">
            <label for="carModel">รุ่น *</label>
            <input type="text" id="carModel" placeholder="เช่น Vios, Civic">
          </div>
          <div class="form-group">
            <label for="carYear">ปี</label>
            <input type="number" id="carYear" placeholder="2024">
          </div>
          <div class="form-group">
            <label for="carPlate">ทะเบียน</label>
            <input type="text" id="carPlate" placeholder="กข 1234">
          </div>
          <div class="form-group span2">
            <label for="carTankSize">ความจุถัง (L)</label>
            <input type="number" step="0.1" id="carTankSize" placeholder="50">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCarForm()">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveCarForm()">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- RECORD FORM MODAL -->
  <div class="modal-overlay" id="recordFormModal" onclick="handleOverlayClick(event,'recordFormModal')">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 id="recordFormTitle">บันทึกการเติมน้ำมัน</h2>
        <button class="modal-close" onclick="closeRecordForm()">✕</button>
      </div>


      <div class="form-section">
        <h3>ข้อมูลการเติม</h3>
        <div class="form-group">
          <label for="recDate">วันที่ *</label>
          <input type="date" id="recDate">
        </div>
        <div class="form-group">
          <label for="recStation">ปั๊ม *</label>
          <select id="recStation">
            <option value="">เลือกปั๊ม</option>
            <option value="ปตท.">ปตท.</option>
            <option value="บางจาก">บางจาก</option>
            <option value="เชลล์">เชลล์</option>
            <option value="เอสโซ่">เอสโซ่</option>
            <option value="คาลเท็กซ์">คาลเท็กซ์</option>
            <option value="ซัสโก้">ซัสโก้</option>
            <option value="ปตท. Cafe Amazon">ปตท. Cafe Amazon</option>
            <option value="อื่นๆ">อื่นๆ</option>
          </select>
        </div>
        <div class="form-group">
          <label for="recFuelType">ประเภทน้ำมัน *</label>
          <select id="recFuelType">
            <option value="">เลือกประเภท</option>
            <option value="แก๊สโซฮอล์ 91">แก๊สโซฮอล์ 91</option>
            <option value="แก๊สโซฮอล์ 95">แก๊สโซฮอล์ 95</option>
            <option value="แก๊สโซฮอล์ E20">แก๊สโซฮอล์ E20</option>
            <option value="แก๊สโซฮอล์ E85">แก๊สโซฮอล์ E85</option>
            <option value="ดีเซล B7">ดีเซล B7</option>
            <option value="ดีเซล B20">ดีเซล B20</option>
            <option value="ดีเซล Premium">ดีเซล Premium</option>
            <option value="เบนซิน 91">เบนซิน 91</option>
            <option value="เบนซิน 95">เบนซิน 95</option>
          </select>
        </div>
      </div>

      <div class="form-section">
        <h3>รายละเอียดการเติม</h3>
        <div style="margin-bottom:14px;">
          <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pricePerL')">ราคา/ลิตร</button>
            <button class="tab-btn" onclick="switchTab('totalCost')">ราคารวม</button>
          </div>
        </div>
        <div id="tabPricePerL">
          <div class="form-group">
            <label for="recPricePerL">ราคาต่อลิตร (฿)</label>
            <input type="number" step="0.01" id="recPricePerL" placeholder="35.50" oninput="calcFromPricePerL()">
          </div>
          <div class="form-group">
            <label for="recLiters">ลิตรที่เติม (L)</label>
            <input type="number" step="0.01" id="recLiters" placeholder="20.00" oninput="calcFromPricePerL()">
          </div>
          <div class="inline-calc" id="calcTotal">ราคารวม: -</div>
        </div>
        <div id="tabTotalCost" style="display:none;">
          <div class="form-group">
            <label for="recTotalCost">ราคารวม (฿)</label>
            <input type="number" step="0.01" id="recTotalCost" placeholder="710.00" oninput="calcFromTotalCost()">
          </div>
          <div class="form-group">
            <label for="recLiters2">ลิตรที่เติม (L)</label>
            <input type="number" step="0.01" id="recLiters2" placeholder="20.00" oninput="calcFromTotalCost()">
          </div>
          <div class="inline-calc" id="calcPricePerL">ราคาต่อลิตร: -</div>
        </div>
      </div>

      <div class="form-section">
        <h3>ข้อมูลระยะทาง (ไม่จำเป็น)</h3>
        <div class="form-group">
          <label for="recKmDriven">กิโลที่วิ่ง (km)</label>
          <input type="number" step="0.1" id="recKmDriven" placeholder="350" oninput="calcAvgCar()">
        </div>
        <div class="inline-calc" id="calcAvg">อัตราสิ้นเปลือง: -</div>
      </div>

      <div class="form-section">
        <h3>หมายเหตุ</h3>
        <div class="form-group">
          <label for="recNote">บันทึกเพิ่มเติม</label>
          <textarea id="recNote" rows="3" placeholder="เช่น เติมเต็มถัง, น้ำมันหมด"></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeRecordForm()">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveRecordForm()">บันทึก</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script>
// ======== STATE ========
let state = {
  cars: [],
  currentCarId: null,
  editingCarId: null,
  editingRecordId: null
};

// ======== TOAST ========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ======== UTILS ========
function currentCar() {
  return state.cars.find(c => c.id === state.currentCarId);
}

function formatDate(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' });
}

function generateId() {
  return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
}

// ======== SIDEBAR (desktop) ========
function renderSidebar() {
  const list = document.getElementById('sidebarCarList');
  if (!list) return;
  if (!state.cars || !state.cars.length) {
    list.innerHTML = `<div style="padding:8px;font-size:13px;color:var(--text-muted);">ยังไม่มีรถ</div>`;
    return;
  }
  list.innerHTML = state.cars.map(car => {
    const recCount = car.records ? car.records.length : 0;
    const isActive = car.id === state.currentCarId;
    return `
      <div class="sidebar-car-item ${isActive ? 'active' : ''}" onclick="openCarDetail('${car.id}')">
        <div class="sidebar-car-icon">🚗</div>
        <div class="sidebar-car-info">
          <div class="sidebar-car-name">${car.brand} ${car.model}</div>
          <div class="sidebar-car-sub">${car.plate || 'ไม่ระบุ'} · ${recCount} รายการ</div>
        </div>
        <div class="sidebar-car-actions">
          <button class="icon-btn edit" onclick="event.stopPropagation();editCar('${car.id}')" title="แก้ไข">✏️</button>
          <button class="icon-btn" onclick="event.stopPropagation();deleteCar('${car.id}')" title="ลบ">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

// ======== SAVE/LOAD ========
async function saveState() {
  if (window.firebaseAuth && window.firebaseAuth.currentUser && window.userDocRef) {
    const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    await setDoc(window.userDocRef, { state: state });
  } else {
    localStorage.setItem('poonfuel', JSON.stringify(state));
  }
}

function loadState() {
  // Only load from localStorage when NOT using Firebase (no logged-in user)
  if (window.firebaseAuth && window.firebaseAuth.currentUser) return;
  const stored = localStorage.getItem('poonfuel');
  if (stored) {
    try {
      state = JSON.parse(stored);
    } catch (e) {
      console.error('Load error:', e);
    }
  }
}

// ======== NAVIGATION ========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  const backBtn = document.getElementById('backBtn');
  const headerTitle = document.getElementById('headerTitle');
  const headerLogo = document.getElementById('headerLogo');
  const topbarList = document.getElementById('desktopTopbarList');
  const topbarDetail = document.getElementById('desktopTopbarDetail');
  const desktopTitle = document.getElementById('desktopCarTitle');

  if (id === 'carListScreen') {
    backBtn.style.display = 'none';
    headerTitle.textContent = '';
    if (headerLogo) headerLogo.style.display = '';
    if (topbarList) topbarList.classList.remove('dt-hidden');
    if (topbarDetail) topbarDetail.classList.add('dt-hidden');
  } else if (id === 'carDetailScreen') {
    const car = currentCar();
    const title = car ? `${car.brand} ${car.model}` : '';
    backBtn.style.display = 'flex';
    headerTitle.textContent = title;
    if (headerLogo) headerLogo.style.display = 'none';
    if (topbarList) topbarList.classList.add('dt-hidden');
    if (topbarDetail) topbarDetail.classList.remove('dt-hidden');
    if (desktopTitle) desktopTitle.textContent = title;
  }
  renderSidebar();
}

function goBack() {
  state.currentCarId = null;
  showScreen('carListScreen');
}

function openCarDetail(carId) {
  state.currentCarId = carId;
  showScreen('carDetailScreen');
  renderCarDetail();
}

// ======== CAR LIST ========
function renderCars() {
  renderSidebar();
  const content = document.getElementById('carListContent');
  if (!state.cars || !state.cars.length) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🚗</div>
        <div class="empty-title">ยังไม่มีรถในระบบ</div>
        <div class="empty-sub">กดปุ่ม + เพื่อเพิ่มรถคันแรก</div>
      </div>
    `;
    return;
  }
  const html = `<div class="car-grid">${state.cars.map(car => {
    const recCount = car.records ? car.records.length : 0;
    const totalCost = car.records ? car.records.reduce((s,r) => s + (r.totalCost||0), 0) : 0;
    return `
      <div class="car-card" onclick="openCarDetail('${car.id}')">
        <div class="car-icon">🚗</div>
        <div class="car-info">
          <div class="car-name">${car.brand} ${car.model}</div>
          <div class="car-sub">${car.plate || 'ไม่ระบุทะเบียน'} · ${recCount} รายการ${totalCost > 0 ? ' · ฿' + totalCost.toLocaleString('th', {maximumFractionDigits:0}) : ''}</div>
        </div>
        <div class="car-actions">
          <button class="icon-btn edit" onclick="event.stopPropagation(); editCar('${car.id}')" title="แก้ไข">✏️</button>
          <button class="icon-btn" onclick="event.stopPropagation(); deleteCar('${car.id}')" title="ลบ">🗑️</button>
        </div>
      </div>
    `;
  }).join('')}</div>`;
  content.innerHTML = html;
}

// ======== CAR FORM ========
function openCarForm() {
  state.editingCarId = null;
  document.getElementById('carFormTitle').textContent = 'เพิ่มรถใหม่';
  document.getElementById('carBrand').value = '';
  document.getElementById('carModel').value = '';
  document.getElementById('carYear').value = '';
  document.getElementById('carPlate').value = '';
  document.getElementById('carTankSize').value = '';
  document.getElementById('carFormModal').classList.add('active');
}

function editCar(carId) {
  const car = state.cars.find(c => c.id === carId);
  if (!car) return;
  state.editingCarId = carId;
  document.getElementById('carFormTitle').textContent = 'แก้ไขรถ';
  document.getElementById('carBrand').value = car.brand || '';
  document.getElementById('carModel').value = car.model || '';
  document.getElementById('carYear').value = car.year || '';
  document.getElementById('carPlate').value = car.plate || '';
  document.getElementById('carTankSize').value = car.tankSize || '';
  document.getElementById('carFormModal').classList.add('active');
}

function closeCarForm() {
  document.getElementById('carFormModal').classList.remove('active');
  state.editingCarId = null;
}

function saveCarForm() {
  const brand = document.getElementById('carBrand').value.trim();
  const model = document.getElementById('carModel').value.trim();
  if (!brand || !model) {
    showToast('กรุณากรอกยี่ห้อและรุ่น');
    return;
  }
  const year = document.getElementById('carYear').value.trim();
  const plate = document.getElementById('carPlate').value.trim();
  const tankSize = parseFloat(document.getElementById('carTankSize').value) || null;

  if (state.editingCarId) {
    const car = state.cars.find(c => c.id === state.editingCarId);
    if (car) {
      car.brand = brand;
      car.model = model;
      car.year = year;
      car.plate = plate;
      car.tankSize = tankSize;
      showToast('อัปเดตรถแล้ว');
    }
  } else {
    state.cars.push({
      id: generateId(),
      brand,
      model,
      year,
      plate,
      tankSize,
      records: []
    });
    showToast('เพิ่มรถใหม่แล้ว');
  }
  saveState();
  renderCars();
  closeCarForm();
}

function deleteCar(carId) {
  if (!confirm('ต้องการลบรถคันนี้?')) return;
  state.cars = state.cars.filter(c => c.id !== carId);
  saveState();
  renderCars();
  showToast('ลบรถแล้ว');
}

// ======== CAR DETAIL ========
function renderCarDetail() {
  const car = currentCar();
  if (!car) return;
  const content = document.getElementById('carDetailContent');

  // BUILD TABS
  const tabs = `
    <div class="tabs">
      <button class="tab-btn active" onclick="showDetailTab('records')">บันทึก</button>
      <button class="tab-btn" onclick="showDetailTab('stats')">สถิติ</button>
    </div>
  `;

  content.innerHTML = tabs + `
    <div id="detailTabRecords"></div>
    <div id="detailTabStats" style="display:none;"></div>
  `;
  renderRecordsTab();
  renderStatsTab();
}

function showDetailTab(tab) {
  const btns = document.querySelectorAll('#carDetailScreen .tab-btn');
  btns.forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (tab === 'records') {
    document.getElementById('detailTabRecords').style.display = 'block';
    document.getElementById('detailTabStats').style.display = 'none';
  } else {
    document.getElementById('detailTabRecords').style.display = 'none';
    document.getElementById('detailTabStats').style.display = 'block';
  }
}

function renderRecordsTab() {
  const car = currentCar();
  const content = document.getElementById('detailTabRecords');
  if (!car.records || !car.records.length) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⛽</div>
        <div class="empty-title">ยังไม่มีบันทึกการเติมน้ำมัน</div>
        <div class="empty-sub">กดปุ่ม "เติมน้ำมัน" เพื่อเพิ่มบันทึก</div>
      </div>
    `;
    return;
  }

  const sorted = [...car.records].sort((a, b) => new Date(b.date) - new Date(a.date));
  const isDesktop = false; // always use mobile card layout

  const exportBtn = `<div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
    <button class="btn btn-sm btn-gold" onclick="exportPDF()">📄 Export PDF</button>
  </div>`;

  if (isDesktop) {
    const tableRows = sorted.map(r => `
      <tr>
        <td class="mono">${formatDate(r.date)}</td>
        <td>${r.station || '-'}</td>
        <td><span class="rec-fuel-badge">${r.fuelType || '-'}</span></td>
        <td class="mono" style="text-align:right;">${r.totalCost ? r.totalCost.toLocaleString('th',{minimumFractionDigits:2,maximumFractionDigits:2}) : '-'}</td>
        <td class="mono" style="text-align:right;">${r.liters ? r.liters.toFixed(2) : '-'}</td>
        <td class="mono" style="text-align:right;">${r.pricePerL ? r.pricePerL.toFixed(2) : '-'}</td>
        <td class="mono" style="text-align:right;">${r.kmDriven || '-'}</td>
        <td class="mono highlight" style="text-align:right;">${r.avgCar ? r.avgCar.toFixed(2) : '-'}</td>
        <td>
          <div style="display:flex;gap:5px;">
            <button class="icon-btn edit" onclick="editRecord('${r.id}')" title="แก้ไข">✏️</button>
            <button class="icon-btn" onclick="deleteRecord('${r.id}')" title="ลบ">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');

    content.innerHTML = exportBtn + `
      <div class="rec-table-wrap">
        <table class="rec-table">
          <thead>
            <tr>
              <th>วันที่</th>
              <th>ปั๊ม</th>
              <th>น้ำมัน</th>
              <th style="text-align:right;">ราคารวม (฿)</th>
              <th style="text-align:right;">ลิตร</th>
              <th style="text-align:right;">฿/L</th>
              <th style="text-align:right;">กม.</th>
              <th style="text-align:right;">km/L</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    `;
  } else {
    const cards = sorted.map(r => `
      <div class="rec-card">
        <div class="rec-header">
          <div class="rec-date">${formatDate(r.date)}</div>
          <div class="rec-fuel-badge">${r.fuelType || '-'}</div>
        </div>
        <div class="rec-row">
          <span class="rec-label">ปั๊ม</span>
          <span class="rec-val">${r.station || '-'}</span>
        </div>
        <div class="rec-row">
          <span class="rec-label">ราคารวม</span>
          <span class="rec-val">${r.totalCost ? r.totalCost.toFixed(2) : '-'} ฿</span>
        </div>
        <div class="rec-row">
          <span class="rec-label">ลิตร</span>
          <span class="rec-val">${r.liters ? r.liters.toFixed(2) : '-'} L</span>
        </div>
        <div class="rec-row">
          <span class="rec-label">ราคา/ลิตร</span>
          <span class="rec-val">${r.pricePerL ? r.pricePerL.toFixed(2) : '-'} ฿/L</span>
        </div>
        ${r.kmDriven ? `
          <div class="rec-row">
            <span class="rec-label">ระยะทาง</span>
            <span class="rec-val">${r.kmDriven} km</span>
          </div>
          <div class="rec-row">
            <span class="rec-label">อัตราสิ้นเปลือง</span>
            <span class="rec-val rec-highlight">${r.avgCar ? r.avgCar.toFixed(2) : '-'} km/L</span>
          </div>
        ` : ''}
        ${r.note ? `<div class="rec-row"><span class="rec-label">หมายเหตุ</span><span class="rec-val">${r.note}</span></div>` : ''}
        <div class="rec-actions">
          <button class="btn btn-sm btn-secondary" onclick="editRecord('${r.id}')">แก้ไข</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRecord('${r.id}')">ลบ</button>
        </div>
      </div>
    `).join('');
    content.innerHTML = exportBtn + `<div class="rec-list">${cards}</div>`;
  }
}

function renderStatsTab() {
  const car = currentCar();
  const content = document.getElementById('detailTabStats');

  if (!car.records || !car.records.length) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <div class="empty-title">ยังไม่มีข้อมูลสถิติ</div>
        <div class="empty-sub">เพิ่มบันทึกการเติมน้ำมันก่อน</div>
      </div>
    `;
    return;
  }

  const totalCost = car.records.reduce((s, r) => s + (r.totalCost || 0), 0);
  const totalLiters = car.records.reduce((s, r) => s + (r.liters || 0), 0);
  const totalKm = car.records.reduce((s, r) => s + (r.kmDriven || 0), 0);

  const avgCost = totalCost / car.records.length;

  const withKm = car.records.filter(r => r.kmDriven && r.liters);
  const avgKmL = withKm.length > 0
    ? withKm.reduce((s, r) => s + (r.kmDriven / r.liters), 0) / withKm.length
    : 0;

  // TOP 3 FUEL
  const fuelMap = {};
  car.records.forEach(r => {
    if (r.fuelType) {
      fuelMap[r.fuelType] = (fuelMap[r.fuelType] || 0) + 1;
    }
  });
  const top3Fuel = Object.entries(fuelMap).sort((a, b) => b[1] - a[1]).slice(0, 3);
  if (top3Fuel.length === 0) top3Fuel.push(['ไม่มีข้อมูล', 0]);

  // TOP 3 STATION
  const stationMap = {};
  car.records.forEach(r => {
    if (r.station) {
      stationMap[r.station] = (stationMap[r.station] || 0) + 1;
    }
  });
  const top3Station = Object.entries(stationMap).sort((a, b) => b[1] - a[1]).slice(0, 3);
  if (top3Station.length === 0) top3Station.push(['ไม่มีข้อมูล', 0]);

  // TOP 3 VALUE (km per 100 baht)
  const valueMap = {};
  car.records.forEach(r => {
    if (r.fuelType && r.kmDriven && r.totalCost && r.totalCost > 0) {
      if (!valueMap[r.fuelType]) {
        valueMap[r.fuelType] = { km: 0, cost: 0 };
      }
      valueMap[r.fuelType].km += r.kmDriven;
      valueMap[r.fuelType].cost += r.totalCost;
    }
  });
  const top3Value = Object.entries(valueMap)
    .map(([fuel, v]) => [fuel, v.km / v.cost])
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3);

  const html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">ค่าใช้จ่ายรวม</div>
        <div class="stat-val gold">${totalCost.toLocaleString('th', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
        <div class="stat-sub">บาท</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">จำนวนครั้ง</div>
        <div class="stat-val">${car.records.length}</div>
        <div class="stat-sub">บันทึก</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">เฉลี่ยต่อครั้ง</div>
        <div class="stat-val">${avgCost.toFixed(2)}</div>
        <div class="stat-sub">บาท/ครั้ง</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ลิตรรวม</div>
        <div class="stat-val">${totalLiters.toFixed(2)}</div>
        <div class="stat-sub">ลิตร</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ระยะทางรวม</div>
        <div class="stat-val">${totalKm.toLocaleString('th')}</div>
        <div class="stat-sub">กิโลเมตร</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">อัตราสิ้นเปลือง (เฉลี่ย)</div>
        <div class="stat-val green">${avgKmL.toFixed(2)}</div>
        <div class="stat-sub">km/L</div>
      </div>
    </div>

    <div class="section-title">Top 3 น้ำมันที่เติมบ่อย</div>
    <div class="form-section" style="padding:16px;">
      ${top3Fuel.map(([name,cnt],i) => `<div class="top3-item"><div class="top3-rank rank-${i+1}">${i+1}</div><div class="top3-name">${name}</div><div class="top3-val">${cnt} ครั้ง</div></div>`).join('')}
    </div>

    <div class="section-title">Top 3 ปั๊มที่ใช้บ่อย</div>
    <div class="form-section" style="padding:16px;">
      ${top3Station.map(([name,cnt],i) => `<div class="top3-item"><div class="top3-rank rank-${i+1}">${i+1}</div><div class="top3-name">${name}</div><div class="top3-val">${cnt} ครั้ง</div></div>`).join('')}
    </div>

    <div class="section-title">Top 3 น้ำมันคุ้มค่าที่สุด</div>
    <div class="form-section" style="padding:16px;">
      ${top3Value.length ? top3Value.map(([name,val],i) => `<div class="top3-item"><div class="top3-rank rank-${i+1}">${i+1}</div><div class="top3-name">${name}</div><div class="top3-val">${(val*100).toFixed(1)} กม./100฿</div></div>`).join('') : '<div style="color:var(--text-muted);font-size:13px;">ยังไม่มีข้อมูลระยะทาง</div>'}
    </div>
  `;
  content.innerHTML = html;
}

// ======== RECORD FORM ========
function openRecordForm() {
  state.editingRecordId = null;
  document.getElementById('recordFormTitle').textContent = 'บันทึกการเติมน้ำมัน';
  document.getElementById('recDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('recStation').value = '';
  document.getElementById('recFuelType').value = '';
  document.getElementById('recPricePerL').value = '';
  document.getElementById('recLiters').value = '';
  document.getElementById('recTotalCost').value = '';
  document.getElementById('recLiters2').value = '';
  document.getElementById('recKmDriven').value = '';
  document.getElementById('recNote').value = '';
  document.getElementById('calcTotal').textContent = 'ราคารวม: -';
  document.getElementById('calcPricePerL').textContent = 'ราคาต่อลิตร: -';
  document.getElementById('calcAvg').textContent = 'อัตราสิ้นเปลือง: -';
  switchTab('pricePerL');
  document.getElementById('recordFormModal').classList.add('active');
}

function editRecord(recId) {
  const car = currentCar();
  const rec = car.records.find(r => r.id === recId);
  if (!rec) return;
  state.editingRecordId = recId;
  document.getElementById('recordFormTitle').textContent = 'แก้ไขบันทึก';
  document.getElementById('recDate').value = rec.date || '';
  document.getElementById('recStation').value = rec.station || '';
  document.getElementById('recFuelType').value = rec.fuelType || '';
  document.getElementById('recPricePerL').value = rec.pricePerL || '';
  document.getElementById('recLiters').value = rec.liters || '';
  document.getElementById('recTotalCost').value = rec.totalCost || '';
  document.getElementById('recLiters2').value = rec.liters || '';
  document.getElementById('recKmDriven').value = rec.kmDriven || '';
  document.getElementById('recNote').value = rec.note || '';
  switchTab('pricePerL');
  calcFromPricePerL();
  calcFromTotalCost();
  calcAvgCar();
  document.getElementById('recordFormModal').classList.add('active');
}

function closeRecordForm() {
  document.getElementById('recordFormModal').classList.remove('active');
  state.editingRecordId = null;
}

function switchTab(tab) {
  const tabs = document.querySelectorAll('#recordFormModal .tab-btn');
  tabs.forEach(t => t.classList.remove('active'));
  if (tab === 'pricePerL') {
    tabs[0].classList.add('active');
    document.getElementById('tabPricePerL').style.display = 'block';
    document.getElementById('tabTotalCost').style.display = 'none';
  } else {
    tabs[1].classList.add('active');
    document.getElementById('tabPricePerL').style.display = 'none';
    document.getElementById('tabTotalCost').style.display = 'block';
  }
}

function calcFromPricePerL() {
  const pricePerL = parseFloat(document.getElementById('recPricePerL').value) || 0;
  const liters = parseFloat(document.getElementById('recLiters').value) || 0;
  const total = pricePerL * liters;
  document.getElementById('calcTotal').textContent = total > 0 ? `ราคารวม: ${total.toFixed(2)} ฿` : 'ราคารวม: -';
  // sync to tab2
  document.getElementById('recTotalCost').value = total > 0 ? total.toFixed(2) : '';
  document.getElementById('recLiters2').value = liters > 0 ? liters.toFixed(2) : '';
}

function calcFromTotalCost() {
  const totalCost = parseFloat(document.getElementById('recTotalCost').value) || 0;
  const liters = parseFloat(document.getElementById('recLiters2').value) || 0;
  const pricePerL = liters > 0 ? totalCost / liters : 0;
  document.getElementById('calcPricePerL').textContent = pricePerL > 0 ? `ราคาต่อลิตร: ${pricePerL.toFixed(2)} ฿/L` : 'ราคาต่อลิตร: -';
  // sync to tab1
  document.getElementById('recPricePerL').value = pricePerL > 0 ? pricePerL.toFixed(2) : '';
  document.getElementById('recLiters').value = liters > 0 ? liters.toFixed(2) : '';
}

function calcAvgCar() {
  const kmDriven = parseFloat(document.getElementById('recKmDriven').value) || 0;
  const liters = parseFloat(document.getElementById('recLiters').value) || parseFloat(document.getElementById('recLiters2').value) || 0;
  const avg = liters > 0 ? kmDriven / liters : 0;
  document.getElementById('calcAvg').textContent = avg > 0 ? `อัตราสิ้นเปลือง: ${avg.toFixed(2)} km/L` : 'อัตราสิ้นเปลือง: -';
}

function saveRecordForm() {
  const car = currentCar();
  if (!car) return;

  const date = document.getElementById('recDate').value;
  const station = document.getElementById('recStation').value;
  const fuelType = document.getElementById('recFuelType').value;

  if (!date || !station || !fuelType) {
    showToast('กรุณากรอกวันที่ ปั๊ม และประเภทน้ำมัน');
    return;
  }

  const pricePerL = parseFloat(document.getElementById('recPricePerL').value) || null;
  const liters = parseFloat(document.getElementById('recLiters').value) || parseFloat(document.getElementById('recLiters2').value) || null;
  const totalCost = parseFloat(document.getElementById('recTotalCost').value) || (pricePerL && liters ? pricePerL * liters : null);
  const kmDriven = parseFloat(document.getElementById('recKmDriven').value) || null;
  const avgCar = (kmDriven && liters && liters > 0) ? kmDriven / liters : null;
  const note = document.getElementById('recNote').value.trim();

  if (state.editingRecordId) {
    const rec = car.records.find(r => r.id === state.editingRecordId);
    if (rec) {
      rec.date = date;
      rec.station = station;
      rec.fuelType = fuelType;
      rec.pricePerL = pricePerL;
      rec.liters = liters;
      rec.totalCost = totalCost;
      rec.kmDriven = kmDriven;
      rec.avgCar = avgCar;
      rec.note = note;
      showToast('อัปเดตบันทึกแล้ว');
    }
  } else {
    car.records.push({
      id: generateId(),
      date,
      station,
      fuelType,
      pricePerL,
      liters,
      totalCost,
      kmDriven,
      avgCar,
      note
    });
    showToast('บันทึกการเติมน้ำมันแล้ว');
  }
  saveState();
  renderCarDetail();
  closeRecordForm();
}

function deleteRecord(recId) {
  if (!confirm('ต้องการลบบันทึกนี้?')) return;
  const car = currentCar();
  car.records = car.records.filter(r => r.id !== recId);
  saveState();
  renderCarDetail();
  showToast('ลบบันทึกแล้ว');
}

function exportPDF() {
  const car = currentCar();
  if (!car || !car.records || !car.records.length) {
    showToast('ยังไม่มีข้อมูลสำหรับ export');
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text(`POON FUEL REPORT`, 105, 18, { align: 'center' });

  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.text(`${car.brand} ${car.model} (${car.year || '-'})`, 105, 26, { align: 'center' });

  const rows = car.records.map((r, i) => [
    i + 1,
    formatDate(r.date),
    r.station,
    r.fuelType,
    r.pricePerL?.toFixed(2) || '-',
    r.totalCost?.toFixed(0) || '-',
    r.liters?.toFixed(2) || '-',
    r.kmDriven || '-',
    r.avgCar?.toFixed(2) || '-'
  ]);

  doc.autoTable({
    startY: 34,
    head: [[
      '#',
      'Date',
      'Station',
      'Fuel',
      '฿/L',
      'Cost',
      'Liters',
      'KM',
      'AVG'
    ]],
    body: rows,
    styles: {
      halign: 'center',
      valign: 'middle',
      fontSize: 9,
      cellPadding: 3,
      lineColor: [180,180,180],
      lineWidth: 0.2
    },
    headStyles: {
      fillColor: [40, 40, 40],
      halign: 'center',
      fontStyle: 'bold'
    },
    alternateRowStyles: {
      fillColor: [245,245,245]
    },
    margin: { left: 10, right: 10 }
  });

  doc.save(`POONFUEL_${car.brand}_${car.model}.pdf`);
}

// ======== MODAL OVERLAY CLICK ========
function handleOverlayClick(e, modalId) {
  if (e.target.classList.contains('modal-overlay')) {
    if (modalId === 'carFormModal') closeCarForm();
    else if (modalId === 'recordFormModal') closeRecordForm();
  }
}

// Re-render records tab on resize (switch between table and cards)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state.currentCarId) renderRecordsTab();
  }, 200);
});

// ======== INIT ========
loadState();
renderCars();
window.saveState = saveState;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcYJcFVEyHXb1cvxNAVABhUOWLpv4aa80",
  authDomain: "poonfuel.firebaseapp.com",
  projectId: "poonfuel",
  storageBucket: "poonfuel.firebasestorage.app",
  messagingSenderId: "1069277350906",
  appId: "1:1069277350906:web:937c61f1db668530813243",
  measurementId: "G-Z37SEJHNMB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.firebaseAuth = auth;

async function loadUserData(uid) {
  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    window.state = snap.data().state || window.state;
    renderCars();
  } else {
    await saveUserData(uid);
  }
}

async function saveUserData(uid) {
  await setDoc(doc(db, "users", uid), {
    state: window.state
  });
}

window.registerEmail = async function () {
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passwordInput').value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert('สมัครสมาชิกสำเร็จ');
  } catch (e) {
    alert(e.message);
  }
};

window.loginEmail = async function () {
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passwordInput').value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    alert(e.message);
  }
};

window.logoutFirebase = async function () {
  await signOut(auth);
  showToast('ออกจากระบบแล้ว');
};

// Force sign out every time the page loads — user must always login manually
await signOut(auth);

onAuthStateChanged(auth, async (user) => {
  const authBox = document.getElementById('authScreen');
  const appBox = document.getElementById('app');

  if (user) {
    // Reset state to empty before loading user-specific data — prevents cross-user data leakage
    state = window.state = { cars: [], currentCarId: null, editingCarId: null, editingRecordId: null };
    renderCars();

    authBox.style.display = 'none';
    appBox.style.display = 'block';

    // Show user email in sidebar and mobile header
    const sidebarUser = document.getElementById('sidebarUserInfo');
    if (sidebarUser) sidebarUser.textContent = '👤 ' + user.email;
    const mobileUserInfo = document.getElementById('mobileUserInfo');
    if (mobileUserInfo) mobileUserInfo.textContent = user.email;

    window.userDocRef = doc(db, "users", user.uid);

    // realtime sync across devices — this is the single source of truth
    onSnapshot(window.userDocRef, async (snap) => {
      if (snap.exists()) {
        const data = snap.data();
        if (data.state) {
          state = window.state = data.state;
          renderCars();
        }
      } else {
        // New user: save the empty state to Firestore
        await saveState();
      }
    });

  } else {
    appBox.style.display = 'none';
    authBox.style.display = 'flex';
  }
});
</script>
